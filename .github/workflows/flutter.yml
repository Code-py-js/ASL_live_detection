name: CI - Flutter Tests

on:
  push:
    branches: [main, develop]
    paths:
      - 'mobile/**'
      - '.github/workflows/flutter.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'mobile/**'
      - '.github/workflows/flutter.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.x'
          channel: 'stable'
      
      - name: Get Flutter dependencies
        working-directory: ./mobile
        run: flutter pub get
      
      - name: Run Flutter analyzer
        working-directory: ./mobile
        run: flutter analyze
        continue-on-error: true
      
      - name: Run unit tests
        working-directory: ./mobile
        run: flutter test --coverage
      
      - name: Generate coverage report
        working-directory: ./mobile
        run: |
          if command -v genhtml &> /dev/null; then
            genhtml coverage/lcov.info -o coverage/html
          fi
        continue-on-error: true
      
      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./mobile/coverage/lcov.info
          flags: flutter
          name: flutter-coverage
        continue-on-error: true
      
      - name: Build APK for testing
        working-directory: ./mobile
        run: flutter build apk --debug
        continue-on-error: true
      
      - name: Upload APK artifacts
        uses: actions/upload-artifact@v3
        with:
          name: flutter-debug-apk
          path: mobile/build/app/outputs/flutter-apk/app-debug.apk
        continue-on-error: true
      
      - name: Comment PR with Flutter test results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ Flutter tests completed and APK built successfully'
            });
        continue-on-error: true
